name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    # Manually trigger CI on any branch (for build testing) or tag (to re-release).
    # Select the target from the branch/tag dropdown in the GitHub Actions UI.

# Least-privilege default: jobs that need write access declare it explicitly
permissions:
  contents: read

# Cancel superseded runs on the same branch/PR to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 9  # matches lockfileVersion 9.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      # pnpm/action-setup does not put the store at ~/.local/share/pnpm/store,
      # so ask pnpm for the real location instead of hardcoding it
      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: --lockfile=pnpm-lock.yaml

      - run: pnpm exec tsc --noEmit

  build:
    name: Build Linux Packages (deb / rpm)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      # pnpm/action-setup does not put the store at ~/.local/share/pnpm/store,
      # so ask pnpm for the real location instead of hardcoding it
      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      # Ubuntu can cross-build rpm; Fedora would need dpkg/fakeroot for deb
      - name: Install cross-format build tools
        run: sudo apt-get install -y --no-install-recommends rpm fakeroot

      # Electron downloads large binaries; cache them to avoid re-downloading each run.
      # Key is per-job to avoid two parallel jobs racing to reserve the same key;
      # restore-keys still lets each job warm-start from the other's cache (the
      # Linux electron binary is identical on both runners).
      - name: Cache Electron binary cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-linux-${{ github.job }}-${{ hashFiles('package.json') }}
          restore-keys: electron-linux-

      - run: pnpm install --frozen-lockfile

      - name: Build & package (deb / rpm)
        # AppImage is built in arch-build to run both jobs in parallel
        run: pnpm run build && pnpm exec electron-builder --linux deb rpm --publish never

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: linux-packages
          path: |
            release/*.deb
            release/*.rpm
          if-no-files-found: error
          retention-days: 7

  arch-build:
    name: Build Arch Packages (AppImage / .pacman)
    runs-on: ubuntu-latest
    container:
      image: archlinux@sha256:9d95c7c95276ea44e5e87f4974672a91f46e38e91d60f5c342f94274f477aa40  # latest as of 2026-04-16
    needs: typecheck
    steps:
      # Install build tools first — checkout action requires git
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git nodejs npm fakeroot zstd libxcrypt-compat
          npm install -g pnpm@9

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      # Per-job key (no save race); restore-keys warm-starts from the ubuntu
      # build job's cache when present (Linux electron binary is identical)
      - name: Cache Electron binary cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-linux-${{ github.job }}-${{ hashFiles('package.json') }}
          restore-keys: electron-linux-

      - run: pnpm install --frozen-lockfile

      - name: Build & package (AppImage / pacman)
        run: pnpm run build && pnpm exec electron-builder --linux AppImage pacman --publish never

      - name: Upload Arch packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: arch-packages
          path: |
            release/*.AppImage
            release/*.pacman
          if-no-files-found: error
          retention-days: 7

  sync-docs:
    name: Sync Docs
    # Only auto-commit on main; PRs just validate the script runs cleanly
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Use a token with push rights so the commit can trigger Pages deployment
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          # No pnpm needed — script only uses built-in Node modules

      - name: Regenerate download section
        run: node scripts/sync-docs.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet docs/index.html && echo "docs already up to date" || (
            git add docs/index.html &&
            git commit -m "chore: sync docs download links [skip ci]" &&
            git push
          )

  release:
    name: Publish Release
    # Runs on version tag pushes, or manual dispatch targeting a version tag
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, arch-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4
        with:
          name: linux-packages
          path: release/

      - name: Download Arch packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4
        with:
          name: arch-packages
          path: release/

      - name: Generate SHA256 checksums
        run: cd release && sha256sum *.AppImage *.deb *.rpm *.pacman > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          files: release/*
          generate_release_notes: true
