name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9  # matches lockfileVersion 9.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec tsc --noEmit

  build:
    name: Build Linux Packages (AppImage / deb / rpm)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # Ubuntu can cross-build rpm; Fedora would need dpkg/fakeroot for deb
      - name: Install cross-format build tools
        run: sudo apt-get install -y --no-install-recommends rpm fakeroot

      # Electron downloads large binaries; cache them to avoid re-downloading each run
      - name: Cache Electron binary cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: electron-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Build & package
        run: pnpm run package

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error
          retention-days: 7

  sync-docs:
    name: Sync Docs
    # Only auto-commit on main; PRs just validate the script runs cleanly
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token with push rights so the commit can trigger Pages deployment
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No pnpm needed — script only uses built-in Node modules

      - name: Regenerate download section
        run: node scripts/sync-docs.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet docs/index.html && echo "docs already up to date" || (
            git add docs/index.html &&
            git commit -m "chore: sync docs download links [skip ci]" &&
            git push
          )

  # TODO: Add arch-build job here (runs-on: ubuntu-latest with an Arch container,
  # or a self-hosted Arch runner) to produce a .pkg.tar.zst for pacman.
  # The release job below would then also download the arch-packages artifact.

  release:
    name: Publish Release
    # Only run when a version tag is pushed (e.g. v3.1)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
