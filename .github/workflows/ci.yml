name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    # Manually trigger CI on any branch (for build testing) or tag (to re-release).
    # Select the target from the branch/tag dropdown in the GitHub Actions UI.

# Least-privilege default: jobs that need write access declare it explicitly
permissions:
  contents: read

# Cancel superseded runs on the same branch/PR to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 9  # matches lockfileVersion 9.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5  # v2.3.5
        with:
          scan-args: --lockfile=pnpm-lock.yaml

      - run: pnpm exec tsc --noEmit

  build:
    name: Build Linux Packages (deb / rpm)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      # Ubuntu can cross-build rpm; Fedora would need dpkg/fakeroot for deb
      - name: Install cross-format build tools
        run: sudo apt-get install -y --no-install-recommends rpm fakeroot

      # Electron downloads large binaries; cache them to avoid re-downloading each run
      # Key is shared with arch-build: the Linux electron binary is identical on both runners
      - name: Cache Electron binary cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-linux-${{ hashFiles('package.json') }}
          restore-keys: electron-linux-

      - run: pnpm install --frozen-lockfile

      - name: Build & package (deb / rpm)
        # AppImage is built in arch-build to run both jobs in parallel
        run: pnpm run build && pnpm exec electron-builder --linux deb rpm --publish never

      - name: Upload packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: linux-packages
          path: |
            release/*.deb
            release/*.rpm
          if-no-files-found: error
          retention-days: 7

  arch-build:
    name: Build Arch Packages (AppImage / .pacman)
    runs-on: ubuntu-latest
    container:
      image: archlinux@sha256:9d95c7c95276ea44e5e87f4974672a91f46e38e91d60f5c342f94274f477aa40  # latest as of 2026-04-16
    needs: typecheck
    steps:
      # Install build tools first — checkout action requires git
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git nodejs npm fakeroot zstd libxcrypt-compat
          npm install -g pnpm@9

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Share the electron binary cache with the ubuntu build job (Linux binary is identical)
      - name: Cache Electron binary cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-linux-${{ hashFiles('package.json') }}
          restore-keys: electron-linux-

      - run: pnpm install --frozen-lockfile

      - name: Build & package (AppImage / pacman)
        run: pnpm run build && pnpm exec electron-builder --linux AppImage pacman --publish never

      - name: Upload Arch packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: arch-packages
          path: |
            release/*.AppImage
            release/*.pacman
          if-no-files-found: error
          retention-days: 7

  sync-docs:
    name: Sync Docs
    # Only auto-commit on main; PRs just validate the script runs cleanly
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Use a token with push rights so the commit can trigger Pages deployment
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          # No pnpm needed — script only uses built-in Node modules

      - name: Regenerate download section
        run: node scripts/sync-docs.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet docs/index.html && echo "docs already up to date" || (
            git add docs/index.html &&
            git commit -m "chore: sync docs download links [skip ci]" &&
            git push
          )

  release:
    name: Publish Release
    # Runs on version tag pushes, or manual dispatch targeting a version tag
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, arch-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4
        with:
          name: linux-packages
          path: release/

      - name: Download Arch packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4
        with:
          name: arch-packages
          path: release/

      - name: Generate SHA256 checksums
        run: cd release && sha256sum *.AppImage *.deb *.rpm *.pacman > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          files: release/*
          generate_release_notes: true
